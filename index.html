function drawButton(r, label, active, color, big) {
  ctx.save();
  const hover = inRect(mouse, r);
  ctx.fillStyle = active ? (color || "#ff5a5f") : (hover ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.35)");
  roundRect(ctx, r.x, r.y, r.w, r.h, 8); ctx.fill();
  if (active || hover) { ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.stroke(); }
  ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = (big ? "bold 20px" : "bold 13px") + " sans-serif";
  ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2 + 1);
  ctx.textBaseline = "alphabetic"; ctx.restore();
}

// ===== バトル更新 =====
function updateBattle() {
  if (keys.has("KeyP") && !game._pPrev) game.paused = !game.paused;
  game._pPrev = keys.has("KeyP");
  if (game.paused) {
    if (keys.has("KeyR")) { game.state = "select"; resetSel(); }
    mouse.clicked = false; return;
  }

  if (game.phase === "countdown") {
    const before = Math.ceil(game.countdown / 50);
    game.countdown--;
    const after = Math.ceil(game.countdown / 50);
    if (after !== before && after > 0) SFX.play("count");
    if (game.countdown <= 0) { game.phase = "fight"; game.goTimer = 45; SFX.play("go"); }
  }
  if (game.goTimer > 0) game.goTimer--;

  if (hitStop > 0) { hitStop--; return; }
  if (game.koFlash > 0) game.koFlash--;

  const [f1, f2] = game.fighters;
  const prevStocks = [f1.stocks, f2.stocks];

  if (game.phase === "fight" || game.phase === "ko") {
    const in1 = f1.isCPU ? f1.think(f2) : readControls(0);
    const in2 = f2.isCPU ? f2.think(f1) : readControls(1);
    f1.update(in1, f2);
    f2.update(in2, f1);
    updateProjectiles();
  }

  if (f1.stocks < prevStocks[0] || f2.stocks < prevStocks[1]) game.koFlash = 40;

  if (game.phase !== "ko" && (f1.stocks <= 0 || f2.stocks <= 0)) {
    game.phase = "ko"; game.winner = f1.stocks <= 0 ? f2 : f1; game.resultTimer = 90;
  }
  if (game.phase === "ko") {
    game.resultTimer--;
    if (game.resultTimer <= 0) { game.state = "result"; game.resultTimer = 0; SFX.play("win"); }
  }
  updateParticles();
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    const target = p.owner === game.fighters[0] ? game.fighters[1] : game.fighters[0];
    const hit = p.x > target.x && p.x < target.x + target.w && p.y > target.y && p.y < target.y + target.h;
    if (hit && target.invincible <= 0 && target.shieldBreak <= 0) {
      const saveFacing = p.owner.facing; p.owner.facing = p.dir;
      applyHit(target, p.owner, { dmg: SPECIAL.dmg, baseKB: SPECIAL.baseKB, kbScale: SPECIAL.kbScale, angle: SPECIAL.angle, hitstop: 5, shake: 3 });
      p.owner.facing = saveFacing;
      projectiles.splice(i, 1); continue;
    }
    if (p.life <= 0 || p.x < -40 || p.x > CANVAS_W + 40) projectiles.splice(i, 1);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (!p.type) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.vx *= 0.96; }
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ===== バトル描画 =====
function drawBattle() {
  ctx.save();
  if (shakeMag > 0.2) { ctx.translate((Math.random() - 0.5) * shakeMag, (Math.random() - 0.5) * shakeMag); shakeMag *= 0.88; }
  else shakeMag = 0;

  drawSkyBackground();
  drawStage();

  for (const p of projectiles) {
    ctx.fillStyle = p.color; ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.4; ctx.beginPath(); ctx.arc(p.x - p.dir * 6, p.y, p.radius * 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  for (const f of game.fighters) f.draw();
  for (const p of particles) {
    if (p.type === "ring") {
      const t = 1 - p.life / p.max;
      ctx.globalAlpha = Math.max(0, (1 - t) * 0.8);
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1 + 3 * (1 - t);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r + (p.maxR - p.r) * t, 0, Math.PI * 2); ctx.stroke();
      continue;
    }
    ctx.globalAlpha = Math.max(0, p.life / p.max); ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  drawHUD();

  if (game.phase === "countdown") {
    const n = Math.ceil(game.countdown / 50);
    ctx.textAlign = "center"; ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = "#fff"; ctx.font = "bold 120px sans-serif"; ctx.fillText(n > 0 ? String(n) : "GO!", CANVAS_W / 2, CANVAS_H / 2 + 20);
  }
  if (game.goTimer > 0) {
    ctx.textAlign = "center"; ctx.globalAlpha = Math.max(0, game.goTimer / 45);
    ctx.fillStyle = "#ffd23f"; ctx.font = "bold 90px sans-serif"; ctx.fillText("GO!", CANVAS_W / 2, CANVAS_H / 2 + 20); ctx.globalAlpha = 1;
  }
  if (game.koFlash > 0) {
    ctx.globalAlpha = game.koFlash / 40 * 0.6; ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H); ctx.globalAlpha = 1;
    ctx.textAlign = "center"; ctx.fillStyle = "#ff3b3b"; ctx.font = "bold 80px sans-serif";
    ctx.globalAlpha = Math.min(1, game.koFlash / 25); ctx.fillText("KO!", CANVAS_W / 2, CANVAS_H / 2); ctx.globalAlpha = 1;
  }
  if (game.paused) {
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "bold 48px sans-serif";
    ctx.fillText("一時停止中", CANVAS_W / 2, CANVAS_H / 2 - 10);
    ctx.font = "18px sans-serif"; ctx.fillText("P キーで再開 ／ R キーでキャラ選択にもどる", CANVAS_W / 2, CANVAS_H / 2 + 30);
  }
}

function drawStage() {
  drawArenaBackdropProps(STAGE.main);
  drawMainArenaPlatform(STAGE.main);
  STAGE.softs.forEach((p, i) => drawSoftArenaPlatform(p, i));
}

function drawArenaBackdropProps(p) {
  ctx.save();
  ctx.globalAlpha = 0.95;
  drawBrokenPillar(p.x + 156, p.y - 24, 0.95, -0.52);
  drawBrokenPillar(p.x + 286, p.y - 19, 0.78, 0.42);
  drawCrystalCluster(p.x + 372, p.y - 8, 1.05);
  drawCrystalCluster(p.x + 72, p.y + 6, 0.58);

  ctx.strokeStyle = "rgba(70, 214, 255, 0.48)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(p.x + p.w / 2, p.y + 18, 58, Math.PI * 0.12, Math.PI * 0.88);
  ctx.stroke();
  ctx.restore();
}

function drawMainArenaPlatform(p) {
  const x = p.x - 34, y = p.y - 12, w = p.w + 68, topH = 36, depth = 122;

  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.45)";
  ctx.shadowBlur = 22;
  ctx.shadowOffsetY = 16;

  const side = ctx.createLinearGradient(0, y + topH, 0, y + depth);
  side.addColorStop(0, "#6d7480");
  side.addColorStop(0.42, "#3e4657");
  side.addColorStop(1, "#202838");
  ctx.fillStyle = side;
  ctx.beginPath();
  ctx.moveTo(x + 18, y + topH);
  ctx.lineTo(x + w - 18, y + topH);
  ctx.lineTo(x + w - 82, y + depth);
  ctx.lineTo(x + w * 0.58, y + depth + 22);
  ctx.lineTo(x + w * 0.48, y + depth - 2);
  ctx.lineTo(x + 72, y + depth);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  const rockCuts = [
    [x + 58, y + topH + 8, x + 28, y + depth - 18, x + 98, y + depth - 2],
    [x + 170, y + topH + 10, x + 146, y + depth + 8, x + 226, y + depth - 6],
    [x + 355, y + topH + 4, x + 330, y + depth + 15, x + 408, y + depth - 9],
    [x + 498, y + topH + 12, x + 452, y + depth - 2, x + 535, y + depth - 20],
  ];
  for (const [ax, ay, bx, by, cx, cy] of rockCuts) tri(ax, ay, bx, by, cx, cy, "rgba(12,18,31,0.25)");

  const top = ctx.createLinearGradient(0, y, 0, y + topH);
  top.addColorStop(0, "#d4c5a2");
  top.addColorStop(0.52, "#9d9079");
  top.addColorStop(1, "#635d56");
  ctx.fillStyle = top;
  roundRect(ctx, x, y, w, topH, 16);
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "rgba(45,35,28,0.55)";
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  roundRect(ctx, x + 5, y + 2, w - 10, topH - 4, 13);
  ctx.clip();
  drawStoneTilePattern(x, y, w, topH);
  ctx.restore();

  const pulse = 0.5 + 0.5 * Math.sin(frame * 0.05);
  ctx.save();
  ctx.shadowColor = "rgba(140,255,120,0.9)";
  ctx.shadowBlur = 8 + pulse * 10;
  ctx.fillStyle = "#72d66c";
  roundRect(ctx, p.x, p.y, p.w, 7, 4);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = "rgba(220,255,180," + (0.45 + pulse * 0.35).toFixed(3) + ")";
  roundRect(ctx, p.x + 16, p.y + 1, p.w - 32, 2, 2);
  ctx.fill();

  drawTechTrim(x + 18, y + topH - 2, w - 36);
  drawCentralRune(x + w / 2, y + 19);
  drawMossEdge(x + 8, y + 4, w - 16);
  ctx.restore();
}

function drawSoftArenaPlatform(p, i) {
  const x = p.x - 8, y = p.y - 7, w = p.w + 16, h = 22;
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.36)";
  ctx.shadowBlur = 14;
  ctx.shadowOffsetY = 8;

  const body = ctx.createLinearGradient(0, y, 0, y + h);
  body.addColorStop(0, "#e1d0a6");
  body.addColorStop(0.48, "#756d66");
  body.addColorStop(1, "#171c2c");
  ctx.fillStyle = body;
  roundRect(ctx, x, y, w, h, 8);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  const pulse = 0.5 + 0.5 * Math.sin(frame * 0.05 + i * 1.7);
  ctx.save();
  ctx.shadowColor = "rgba(120,220,255,0.9)";
  ctx.shadowBlur = 6 + pulse * 8;
  ctx.fillStyle = "#95dfff";
  roundRect(ctx, p.x, p.y, p.w, 6, 3);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = "rgba(24,92,255,0.72)";
  roundRect(ctx, x + 34, y + h - 5, w - 68, 4, 2);
  ctx.fill();

  ctx.strokeStyle = "#ffbd45";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + 12, y + h - 7);
  ctx.lineTo(x + 35, y + h - 7);
  ctx.lineTo(x + 42, y + h - 13);
  ctx.moveTo(x + w - 12, y + h - 7);
  ctx.lineTo(x + w - 35, y + h - 7);
  ctx.lineTo(x + w - 42, y + h - 13);
  ctx.stroke();

  ctx.globalAlpha = 0.35;
  disc(x + w / 2, y + h + 4, 18 + i * 2, "#42cfff");
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawStoneTilePattern(x, y, w, h) {
  ctx.strokeStyle = "rgba(63,52,44,0.45)";
  ctx.lineWidth = 1.5;
  const lines = [0.16, 0.31, 0.46, 0.62, 0.78, 0.9];
  for (const t of lines) {
    ctx.beginPath();
    ctx.moveTo(x + w * t, y + 4);
    ctx.lineTo(x + w * (t - 0.04), y + h - 4);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(x + 22, y + h * 0.55);
  ctx.quadraticCurveTo(x + w * 0.34, y + h * 0.18, x + w - 20, y + h * 0.52);
  ctx.stroke();
}

function drawTechTrim(x, y, w) {
  ctx.fillStyle = "#161b2a";
  roundRect(ctx, x, y, w, 13, 5);
  ctx.fill();

  ctx.strokeStyle = "#ffb02e";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + 18, y + 6);
  ctx.lineTo(x + 58, y + 6);
  ctx.lineTo(x + 72, y + 11);
  ctx.lineTo(x + 96, y + 11);
  ctx.moveTo(x + w - 18, y + 6);
  ctx.lineTo(x + w - 58, y + 6);
  ctx.lineTo(x + w - 72, y + 11);
  ctx.lineTo(x + w - 96, y + 11);
  ctx.stroke();

  ctx.strokeStyle = "rgba(42,206,255,0.95)";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(x + w / 2, y + 10, 28, 0, Math.PI);
  ctx.stroke();
}

function drawCentralRune(cx, cy) {
  ctx.save();
  ctx.globalAlpha = 0.78;
  ctx.strokeStyle = "#38d7ff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 52, 13, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, cy, 28, 7, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawMossEdge(x, y, w) {
  const tufts = [
    [0.04, 8], [0.08, 11], [0.14, 7], [0.21, 10], [0.74, 8], [0.82, 12], [0.9, 9], [0.96, 7],
  ];
  for (const [t, len] of tufts) {
    const tx = x + w * t;
    ctx.strokeStyle = "#66bc59";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(tx, y + 3);
    ctx.lineTo(tx - 5, y + 3 + len);
    ctx.moveTo(tx + 4, y + 2);
    ctx.lineTo(tx + 9, y + 2 + len * 0.7);
    ctx.stroke();
  }
}

function drawBrokenPillar(x, y, s, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(s, s);
  const g = ctx.createLinearGradient(0, -72, 0, 24);
  g.addColorStop(0, "#c9c0ae");
  g.addColorStop(0.5, "#81796e");
  g.addColorStop(1, "#4e4c4b");
  ctx.fillStyle = g;
  roundRect(ctx, -16, -76, 32, 98, 5);
  ctx.fill();
  ctx.strokeStyle = "rgba(45,38,34,0.5)";
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = "#d8cdb8";
  ctx.beginPath();
  ctx.moveTo(-20, -76);
  ctx.lineTo(-4, -94);
  ctx.lineTo(19, -78);
  ctx.lineTo(8, -64);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "rgba(44,38,34,0.38)";
  ctx.lineWidth = 2;
  for (let yy = -54; yy <= 6; yy += 22) {
    ctx.beginPath();
    ctx.moveTo(-14, yy);
    ctx.lineTo(14, yy - 3);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCrystalCluster(x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  const crystals = [
    [-28, 22, 16, 66, "#6edbff"],
    [-8, 15, 22, 86, "#9bf0ff"],
    [16, 20, 18, 70, "#47bfff"],
    [34, 30, 11, 45, "#b4f5ff"],
  ];
  for (const [cx, base, hw, hh, col] of crystals) {
    const g = ctx.createLinearGradient(cx, base - hh, cx, base);
    g.addColorStop(0, "#f4ffff");
    g.addColorStop(0.35, col);
    g.addColorStop(1, "#236bb4");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(cx, base - hh);
    ctx.lineTo(cx + hw, base - 12);
    ctx.lineTo(cx + hw * 0.55, base);
    ctx.lineTo(cx - hw * 0.72, base);
    ctx.lineTo(cx - hw, base - 14);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.55)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 0.42;
  disc(6, 22, 46, "#4bdcff");
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const [f1, f2] = game.fighters;
  drawPlayerHUD(f1, 20, "PLAYER 1", "#28c4ff");
  drawPlayerHUD(f2, CANVAS_W - 20 - 260, f2.isCPU ? "CPU (" + DIFFICULTY[game.difficulty].label + ")" : "PLAYER 2", "#ff5a5f");
}

function drawPlayerHUD(f, x, label, accent) {
  const y = CANVAS_H - 84, w = 260, h = 70;
  ctx.fillStyle = "rgba(8,10,24,0.72)"; roundRect(ctx, x, y, w, h, 10); ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = accent; ctx.stroke();

  const c = f.char;
  ctx.save();
  const S = 34 / c.h;
  ctx.translate(x + 28, y + 56);
  ctx.scale(S, S);
  paintCharacter(c, c.w, c.h, { phase: frame * 0.05, moving: false, air: false, attack: null });
  ctx.restore();

  ctx.textAlign = "left"; ctx.fillStyle = accent; ctx.font = "bold 11px sans-serif"; ctx.fillText(label, x + 56, y + 15);
  ctx.fillStyle = "#fff"; ctx.font = "bold 15px sans-serif"; ctx.fillText(c.name, x + 56, y + 32);

  const dmg = Math.floor(f.damage), t = Math.min(1, f.damage / 150);
  ctx.textAlign = "right"; ctx.fillStyle = damageColor(t); ctx.font = "bold 34px sans-serif";
  ctx.fillText(dmg + "%", x + w - 14, y + 40);

  // ストック
  ctx.textAlign = "left";
  for (let i = 0; i < Math.max(0, f.stocks); i++) {
    ctx.fillStyle = c.color; ctx.beginPath(); ctx.arc(x + 60 + i * 15, y + 48, 5.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 1; ctx.stroke();
  }
  // シールドゲージ
  ctx.fillStyle = "rgba(255,255,255,0.15)"; roundRect(ctx, x + 56, y + 56, 120, 6, 3); ctx.fill();
  ctx.fillStyle = f.shieldBreak > 0 ? "#ff5050" : "#7fd0ff";
  roundRect(ctx, x + 56, y + 56, 120 * (f.shieldHP / SHIELD_MAX), 6, 3); ctx.fill();
}

function damageColor(t) {
  if (t < 0.5) { const u = t / 0.5; return `rgb(255,255,${Math.round(255 - u * 200)})`; }
  const u = (t - 0.5) / 0.5; return `rgb(255,${Math.round(220 - u * 180)},${Math.round(55 - u * 55)})`;
}

// ===== 勝敗画面 =====
function updateResult() {
  if (keys.has("Enter") || keys.has("NumpadEnter") || keys.has("Space") || mouse.clicked) {
    mouse.clicked = false; game.state = "select"; resetSel();
  }
  updateParticles();
}

function drawResult() {
  drawSkyBackground();
  ctx.fillStyle = "rgba(10,12,28,0.7)"; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  const w = game.winner;
  ctx.textAlign = "center"; ctx.fillStyle = "#ffd23f"; ctx.font = "bold 30px sans-serif";
  ctx.fillText("WINNER", CANVAS_W / 2, 84);
  if (w) {
    const c = w.char;
    ctx.save();
    const S = 148 / c.h;
    ctx.translate(CANVAS_W / 2, 372 + Math.sin(frame / 10) * 6);
    ctx.scale(S, S);
    paintCharacter(c, c.w, c.h, { phase: frame * 0.06, moving: false, air: false, attack: { key: "uptilt", aim: "up", ext: 1, active: false, swoosh: false } });
    ctx.restore();
    ctx.fillStyle = "#fff"; ctx.font = "bold 40px sans-serif"; ctx.fillText(c.name + " の勝利！", CANVAS_W / 2, 410);
    const loserLabel = (game.fighters[0] === w) ? (game.fighters[1].isCPU ? "CPU" : "PLAYER 2") : "PLAYER 1";
    const winLabel = (game.fighters[0] === w) ? "PLAYER 1" : (game.fighters[1].isCPU ? "CPU" : "PLAYER 2");
    ctx.font = "16px sans-serif"; ctx.fillStyle = "#9fb0d0"; ctx.fillText(winLabel + " が " + loserLabel + " を撃破！", CANVAS_W / 2, 440);
  }
  if (Math.floor(frame / 30) % 2 === 0) {
    ctx.fillStyle = "#fff"; ctx.font = "bold 18px sans-serif"; ctx.fillText("クリック / Enter キーでキャラ選択へ", CANVAS_W / 2, 500);
  }
}

// ===== 背景 =====
// 装飾要素は一度だけ生成(毎フレーム乱数で揺れないよう固定シード)
const BG = (() => {
  let seed = 20260615;
  const rnd = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };
  const rng = (a, b) => a + rnd() * (b - a);
  const stars = [];
  for (let i = 0; i < 84; i++) stars.push({ x: rng(0, CANVAS_W), y: rng(0, CANVAS_H * 0.55), r: rng(0.5, 1.8), tw: rng(0, Math.PI * 2) });
  const motes = [];
  for (let i = 0; i < 26; i++) motes.push({ x: rng(0, CANVAS_W), y: rng(0, CANVAS_H), r: rng(1, 2.6), sp: rng(0.15, 0.5), ph: rng(0, Math.PI * 2), amp: rng(6, 20) });
  const birds = [];
  for (let i = 0; i < 7; i++) birds.push({ x: rng(0, CANVAS_W), y: rng(70, 205), s: rng(0.7, 1.3), sp: rng(0.25, 0.6) });
  const islands = [{ x: 150, y: 168, s: 1.0, a: 0.95 }, { x: 818, y: 238, s: 0.78, a: 0.85 }, { x: 506, y: 112, s: 0.52, a: 0.65 }];
  return { stars, motes, birds, islands };
})();

function drawSkyBackground() {
  if (REAL_BG.ready) {
    drawCoverImage(REAL_BG.image, 0, 0, CANVAS_W, CANVAS_H);

    // Keep the playable area readable over the realistic photo background.
    const shade = ctx.createLinearGradient(0, CANVAS_H * 0.42, 0, CANVAS_H);
    shade.addColorStop(0, "rgba(8,12,24,0)");
    shade.addColorStop(0.72, "rgba(8,12,24,0.20)");
    shade.addColorStop(1, "rgba(8,12,24,0.48)");
    ctx.fillStyle = shade;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    const haze = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
    haze.addColorStop(0, "rgba(255,255,255,0.06)");
    haze.addColorStop(0.45, "rgba(255,255,255,0.02)");
    haze.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = haze;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    return;
  }

  // 1) 多色グラデの空
  const g = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  g.addColorStop(0, "#12204c"); g.addColorStop(0.34, "#274b91"); g.addColorStop(0.6, "#3f7cc4");
  g.addColorStop(0.82, "#86bce4"); g.addColorStop(1, "#dcecf2");
  ctx.fillStyle = g; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 2) 星のきらめき(上空)
  for (const s of BG.stars) {
    const tw = 0.5 + 0.5 * Math.sin(frame * 0.05 + s.tw);
    ctx.globalAlpha = tw * 0.8 * Math.max(0, 1 - s.y / (CANVAS_H * 0.55));
    disc(s.x, s.y, s.r, "#ffffff");
  }
  ctx.globalAlpha = 1;

  // 3) 太陽(光輪 + 光芒)
  drawSun(772, 116);

  // 4) 山脈(空気遠近で3層)
  mountainRange([[60, 302], [170, 250], [290, 312], [410, 242], [520, 300], [660, 232], [800, 300], [910, 258]], 360, "#5d79ad", true);
  mountainRange([[90, 360], [230, 335], [380, 366], [540, 332], [700, 360], [860, 336]], 414, "#446a93", false);
  // 手前の緑の丘
  ctx.fillStyle = "#34604a";
  ctx.beginPath(); ctx.moveTo(0, CANVAS_H); ctx.lineTo(0, 452);
  ctx.quadraticCurveTo(240, 404, 480, 452); ctx.quadraticCurveTo(720, 498, CANVAS_W, 438);
  ctx.lineTo(CANVAS_W, CANVAS_H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "rgba(150,210,150,0.25)"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 452); ctx.quadraticCurveTo(240, 404, 480, 452); ctx.quadraticCurveTo(720, 498, CANVAS_W, 438); ctx.stroke();

  // 5) 遠景の雲(大きく淡くゆっくり)
  drawCloud((90 + frame * 0.08) % (CANVAS_W + 280) - 140, 150, 1.5, 0.5);
  drawCloud((640 + frame * 0.06) % (CANVAS_W + 280) - 140, 196, 1.7, 0.45);

  // 6) 浮遊島(ファンタジー)
  for (const is of BG.islands) drawIsland(is.x, is.y, is.s, is.a);

  // 7) 中景の雲
  drawCloud((180 + frame * 0.16) % (CANVAS_W + 200) - 100, 92, 1.05, 0.92);
  drawCloud((520 + frame * 0.13) % (CANVAS_W + 200) - 100, 150, 0.85, 0.85);
  drawCloud((770 + frame * 0.2) % (CANVAS_W + 200) - 100, 66, 1.2, 0.95);

  // 8) 鳥の群れ
  for (const b of BG.birds) {
    const bx = (b.x + frame * b.sp) % (CANVAS_W + 60) - 30;
    drawBird(bx, b.y + Math.sin(frame * 0.03 + b.x) * 6, b.s, frame * 0.25 + b.x);
  }

  // 9) 漂う光の粒
  for (const m of BG.motes) {
    let my = (m.y - frame * m.sp) % CANVAS_H; if (my < 0) my += CANVAS_H;
    const mx = m.x + Math.sin(frame * 0.02 + m.ph) * m.amp;
    ctx.globalAlpha = 0.22 + 0.25 * (0.5 + 0.5 * Math.sin(frame * 0.06 + m.ph));
    disc(mx, my, m.r, "#fff7d6");
  }
  ctx.globalAlpha = 1;
}

function drawSun(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = 0.05; ctx.rotate(frame * 0.0009);
  for (let i = 0; i < 12; i++) { ctx.rotate(Math.PI / 6); tri(-22, -42, 0, -560, 22, -42, "#fff7d0"); }
  ctx.restore();
  ctx.globalAlpha = 0.1; disc(x, y, 128, "#fff2c0");
  ctx.globalAlpha = 0.16; disc(x, y, 88, "#fff2c0");
  ctx.globalAlpha = 1;
  disc(x, y, 58, "#ffe9a8"); disc(x, y, 50, "#fff6da");
}

function mountainRange(apexes, baseY, color, snow) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(-20, CANVAS_H); ctx.lineTo(-20, baseY);
  for (const [x, y] of apexes) ctx.lineTo(x, y);
  ctx.lineTo(CANVAS_W + 20, baseY); ctx.lineTo(CANVAS_W + 20, CANVAS_H); ctx.closePath(); ctx.fill();
  if (snow) for (const [x, y] of apexes) if (y < baseY - 45) tri(x - 13, y + 20, x, y, x + 13, y + 20, "rgba(255,255,255,0.88)");
}

function drawIsland(x, y, s, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.translate(x, y + Math.sin(frame * 0.02 + x) * 4); ctx.scale(s, s);
  // 岩の下面
  ctx.fillStyle = "#6f4a31"; ctx.beginPath();
  ctx.moveTo(-42, 0); ctx.quadraticCurveTo(-30, 44, 0, 66); ctx.quadraticCurveTo(30, 44, 42, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath();
  ctx.moveTo(2, 6); ctx.quadraticCurveTo(22, 42, 0, 66); ctx.quadraticCurveTo(14, 40, 8, 8); ctx.closePath(); ctx.fill();
  // 草の上面
  ctx.fillStyle = "#5fae54"; ctx.beginPath(); ctx.ellipse(0, 0, 44, 14, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#6fc063"; ctx.beginPath(); ctx.ellipse(0, -2, 44, 11, 0, Math.PI, 0); ctx.fill();
  // 木
  ctx.fillStyle = "#6b4a32"; ctx.fillRect(11, -19, 4, 19);
  disc(13, -26, 11, "#3f8f3a"); disc(7, -22, 8, "#4ba043"); disc(19, -23, 8, "#368233");
  // 小さな滝
  ctx.globalAlpha = alpha * 0.5; ctx.strokeStyle = "#bfe3ff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-18, 4); ctx.lineTo(-21, 42); ctx.stroke();
  ctx.restore(); ctx.globalAlpha = 1;
}

function drawBird(x, y, s, flap) {
  ctx.strokeStyle = "rgba(35,45,65,0.62)"; ctx.lineWidth = 1.8 * s; ctx.lineCap = "round";
  const w = 7 * s, f = Math.sin(flap) * 3 * s + 2 * s;
  ctx.beginPath(); ctx.moveTo(x - w, y); ctx.quadraticCurveTo(x - w * 0.4, y - f, x, y); ctx.quadraticCurveTo(x + w * 0.4, y - f, x + w, y); ctx.stroke();
}

function drawCloud(x, y, s, alpha) {
  ctx.save(); ctx.globalAlpha = (alpha === undefined ? 0.9 : alpha); ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = "rgba(120,150,185,0.45)"; ctx.beginPath(); ctx.ellipse(0, 14, 50, 11, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#ffffff";
  const puffs = [[-44, 10, 18], [44, 10, 16], [-22, 4, 22], [22, 6, 22], [0, -2, 28], [0, 12, 30]];
  for (const [px, py, pr] of puffs) { ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.fill(); }
  ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.arc(-8, -7, 17, 0, Math.PI * 2); ctx.fill();
  ctx.restore(); ctx.globalAlpha = 1;
}

// ===== 汎用 =====
function drawCoverImage(image, x, y, w, h) {
  const scale = Math.max(w / image.naturalWidth, h / image.naturalHeight);
  const sw = w / scale, sh = h / scale;
  const sx = (image.naturalWidth - sw) / 2;
  const sy = (image.naturalHeight - sh) / 2;
  ctx.drawImage(image, sx, sy, sw, sh, x, y, w, h);
}

function roundRect(ctx, x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ===== メインループ(固定タイムステップ) =====
let last = (typeof performance !== "undefined" ? performance.now() : 0);
let acc = 0;
function loop(now) {
  acc += (now - last) / 1000; last = now;
  if (acc > 0.2) acc = 0.2;
  while (acc >= STEP) {
    frame++;
    if (game.state === "battle" && !SAMPLES.bgmActive && SAMPLES.buffers.bgm_battle && !SFX.muted) SAMPLES.startBgm();
    if (game.state !== "battle" && SAMPLES.bgmActive) SAMPLES.stopBgm();
    const sampleBgm = game.state === "battle" && SAMPLES.bgmActive;
    if (frame % 24 === 0 && !(game.state === "battle" && game.paused) && !sampleBgm) SFX.bgmTick(game.state === "battle" ? "battle" : "menu");
    if (game.state === "select") updateSelect();
    else if (game.state === "battle") updateBattle();
    else if (game.state === "result") updateResult();
    acc -= STEP;
  }
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  if (game.state === "select") drawSelect();
  else if (game.state === "battle") drawBattle();
  else if (game.state === "result") drawResult();
  mouse.clicked = false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

  </script>
